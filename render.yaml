services:
  - type: web
    name: mutah-edu-production
    runtime: node
    plan: free
    region: oregon

    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js

    envVars:
      - key: NODE_ENV
        value: production

      # SQLite resolves to ./prisma/dev.db relative to process.cwd()
      # No paid disk needed — ephemeral container resets to pre-seeded data on restart
      - key: HOSTNAME
        value: 0.0.0.0

      - key: DATABASE_URL
        value: file:./prisma/dev.db

      - key: GEMINI_API_KEY
        sync: false
