services:
  - type: web
    name: mutah-edu-production
    runtime: node
    plan: free
    region: oregon

    buildCommand: npm install --include=dev && npm run build
    startCommand: npx next start -H 0.0.0.0 -p 10000

    envVars:
      - key: NODE_ENV
        value: production

      # SQLite resolves to ./prisma/dev.db relative to process.cwd()
      # No paid disk needed — ephemeral container resets to pre-seeded data on restart
      - key: DATABASE_URL
        value: file:./prisma/dev.db

      - key: GEMINI_API_KEY
        sync: false
